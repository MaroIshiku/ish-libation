services:
  ish-libation:
    image: ghcr.io/maroishiku/ish-libation:latest
    pull_policy: always
    container_name: ish-libation
    hostname: ish-libation
    user: "0:0"
    restart: unless-stopped
    environment:
      TZ: Europe/Berlin
      PORT: 3000
      LIBATION_FILES_DIR: /config
      LIBATION_CONFIG_DIR: /config
      LIBATION_DB_DIR: /db
      LIBATION_DB_FILE: ""
      LIBATION_BOOKS_DIR: /data
      PUBLIC_IP_URL: https://api.ipify.org?format=json
      PUBLIC_IP_INTERVAL_SECONDS: 300
      NODE_ENV: production
    volumes:
      - /media/ZimaOS-HD/AppData/ish_libation/config:/config
      - /media/ZimaOS-HD/AppData/ish_libation/db:/db
      - /media/ZimaOS-HD/AppData/ish_libation/data:/data
    ports:
      - "3100:3000/tcp"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://raw.githubusercontent.com/rmcrackan/Libation/master/Source/LibationAvalonia/Assets/libation.ico
  index: /
  is_uncontrolled: false
  port_map: "3100"
  scheme: http
  store_app_id: ish-libation
  title:
    custom: Libation (Ish)
    en_us: Libation (Ish)
